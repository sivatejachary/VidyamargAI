version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: jd-postgres
    restart: always
    environment:
      POSTGRES_DB: vidyamarg_jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vidyamarg_jobs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis Event Broker & Collector Buffer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: jd-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant Vector Search Engine
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: jd-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI Sub-application / Tool API Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jd-api
    restart: always
    ports:
      - "8100:8100"
    environment:
      - JD_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/vidyamarg_jobs
      - JD_REDIS_URL=redis://redis:6379/1
      - JD_QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JD_API_SECRET_KEY=tush-ai-secret-key-development
      - JD_ENABLED_CONNECTORS=remoteok,telegram,greenhouse,lever,wellfound,indeed,linkedin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery Distributed Task Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jd-worker
    restart: always
    command: celery -A app.job_discovery.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - JD_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/vidyamarg_jobs
      - JD_REDIS_URL=redis://redis:6379/1
      - JD_QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TG_API_ID=${TG_API_ID}
      - TG_API_HASH=${TG_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery Beat Scheduler
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jd-beat
    restart: always
    command: celery -A app.job_discovery.workers.celery_app beat --loglevel=info
    environment:
      - JD_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/vidyamarg_jobs
      - JD_REDIS_URL=redis://redis:6379/1
      - JD_QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
