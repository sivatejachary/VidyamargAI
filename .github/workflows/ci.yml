name: CI / Verification Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install ruff mypy pytest pytest-asyncio detect-secrets
    - name: Scan for secrets
      run: detect-secrets scan
    - name: Run Ruff Linter
      run: ruff check backend/ai_os backend/services/candidate_service/app --exit-zero
    - name: Run Mypy Type Checks
      run: mypy backend/ai_os backend/services/candidate_service/app --ignore-missing-imports || true
    - name: Run Pytest Suite
      env:
        SECRET_KEY: temporary-secret-key-for-ci-runs
        TESTING: "true"
        PYTHONPATH: backend
      run: pytest backend/tests

